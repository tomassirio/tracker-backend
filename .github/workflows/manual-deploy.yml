name: Manual Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - prod
          - dev
        default: 'dev'
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      service:
        description: 'Service to deploy (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - wanderer-auth
          - wanderer-command
          - wanderer-query
        default: ''

jobs:
  deploy:
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      image-tag: ${{ github.event.release.tag_name || inputs.image-tag }}
      namespace: ${{ inputs.environment == 'dev' && 'wanderer-dev' || 'wanderer' }}
      service: ${{ inputs.service }}
    secrets: inherit

