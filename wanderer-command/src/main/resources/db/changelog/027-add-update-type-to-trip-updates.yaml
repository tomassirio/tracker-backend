databaseChangeLog:
  - changeSet:
      id: 027-add-update-type-to-trip-updates
      author: tomassirio
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: trip_updates
                columnName: update_type
      changes:
        - addColumn:
            tableName: trip_updates
            columns:
              - column:
                  name: update_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
